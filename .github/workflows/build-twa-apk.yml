name: Build and Deploy TWA APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web/public/aahat.apk'
      - 'web/aahat-release-key.jks'
      - 'web/public/build_log.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          # Install build-tools and platform-tools that Bubblewrap needs
          sdkmanager "build-tools;34.0.0" "platform-tools"
          # Accept all licenses non-interactively
          yes | sdkmanager --licenses || true
          # Create legacy 'tools' symlink so Bubblewrap's path validation passes
          # (it checks for 'tools' or 'bin' at the SDK root)
          rm -rf "$ANDROID_HOME/tools"
          if [ -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest" "$ANDROID_HOME/tools"
          fi

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          # Verify config
          echo "=== Bubblewrap Config ==="
          cat ~/.bubblewrap/config.json
          echo ""
          echo "=== Android SDK contents ==="
          ls -la "$ANDROID_HOME/"

      - name: Build TWA APK
        id: build_apk
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: aahatstorepass
          BUBBLEWRAP_KEY_PASSWORD: aahatstorepass
        run: |
          # Generate signing keystore if it doesn't exist
          if [ ! -f "web/aahat-release-key.jks" ]; then
            keytool -genkey -v -keystore web/aahat-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias aahat-alias -storepass aahatstorepass -keypass aahatstorepass -dname "CN=Aahat, OU=App, O=Aahat, L=Default, S=Default, C=US"
          fi
          
          cd web
          echo "=== Bubblewrap Update & Build ===" > build_log.txt
          echo "ANDROID_HOME=$ANDROID_HOME" >> build_log.txt
          echo "JAVA_HOME=$JAVA_HOME" >> build_log.txt
          echo "SDK contents:" >> build_log.txt
          ls -la "$ANDROID_HOME/" >> build_log.txt 2>&1
          echo "---" >> build_log.txt
          
          # Update/generate android project configurations from custom twa-manifest.json
          echo "=== Running bubblewrap update ===" | tee -a build_log.txt
          bubblewrap update --skipVersionUpgrade 2>&1 | tee -a build_log.txt
          
          # Build signed APK
          echo "=== Running bubblewrap build ===" | tee -a build_log.txt
          bubblewrap build --skipPwaValidation 2>&1 | tee -a build_log.txt
          
          # Search for APK files anywhere in current directory tree
          echo "=== Searching for APK files ===" | tee -a build_log.txt
          find . -name '*.apk' -type f 2>&1 | tee -a build_log.txt
          
          # Check if APK was built (search recursively)
          APK_FILE=$(find . -name '*.apk' -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Build Succeeded! APK found at: $APK_FILE"
            echo "BUILD_RESULT=success" >> $GITHUB_ENV
            echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
          else
            echo "Build Failed! No APK found. See build_log.txt for details."
            cat build_log.txt
            echo "BUILD_RESULT=failure" >> $GITHUB_ENV
            exit 1
          fi

      - name: Commit and Push APK and Logs
        if: always()
        run: |
          set -x
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Debug: show where APK files ended up
          echo "=== Looking for APK files ==="
          find web -name '*.apk' -type f 2>/dev/null || true
          
          # Move compiled APK to public folder
          if [ -n "$APK_PATH" ]; then
            cp "web/$APK_PATH" web/public/aahat.apk 2>/dev/null || cp "$APK_PATH" web/public/aahat.apk 2>/dev/null || true
          fi
          # Fallback: search for any APK in web directory
          if [ ! -f "web/public/aahat.apk" ]; then
            FOUND_APK=$(find web -name '*.apk' -type f | head -1)
            if [ -n "$FOUND_APK" ]; then
              cp "$FOUND_APK" web/public/aahat.apk
            fi
          fi
          
          # Move log file to public folder if it exists
          if [ -f "web/build_log.txt" ]; then
            mv web/build_log.txt web/public/build_log.txt
          fi
          
          git add web/public/aahat.apk web/aahat-release-key.jks web/public/build_log.txt 2>/dev/null || true
          git diff-index --quiet HEAD || git commit -m "chore: commit APK / build logs [skip ci]" || true
          git pull --rebase origin main || true
          git push origin main || true

      - name: Fail if build was unsuccessful
        if: always()
        run: |
          if [ "$BUILD_RESULT" = "failure" ]; then
            echo "Build failed — see committed build_log.txt for details."
            exit 1
          fi
