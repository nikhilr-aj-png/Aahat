name: Build and Deploy TWA APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web/public/aahat.apk'
      - 'web/aahat-release-key.jks'
      - 'web/public/build_log.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Build TWA APK
        run: |
          # Generate signing keystore if it doesn't exist
          if [ ! -f "web/aahat-release-key.jks" ]; then
            keytool -genkey -v -keystore web/aahat-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias aahat-alias -storepass aahatstorepass -keypass aahatkeypass -dname "CN=Aahat, OU=App, O=Aahat, L=Default, S=Default, C=US"
          fi
          
          cd web
          echo "=== Bubblewrap Init & Build ===" > build_log.txt
          
          # Backup our custom twa-manifest.json
          cp twa-manifest.json twa-manifest-temp.json
          
          # Initialize from web manifest URL
          yes | bubblewrap init --manifest=https://raw.githubusercontent.com/nikhilr-aj-png/Aahat/main/web/public/manifest.json --skipConfig >> build_log.txt 2>&1 || true
          
          # Restore our custom twa-manifest.json
          cp twa-manifest-temp.json twa-manifest.json
          
          # Update android project configurations from custom twa-manifest.json
          yes | bubblewrap update >> build_log.txt 2>&1 || true
          
          # Build signed APK
          yes | bubblewrap build --signingKeyPassword="aahatkeypass" --signingStorePassword="aahatstorepass" >> build_log.txt 2>&1 || true
          
          # Check if APK was built
          if [ -f "app-release-signed.apk" ] || ls *.apk 1> /dev/null 2>&1; then
            echo "Build Succeeded!"
          else
            echo "Build Failed!"
            exit 1
          fi

      - name: Commit and Push APK and Logs
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Move compiled APK to public folder if it exists
          if [ -f "web/app-release-signed.apk" ]; then
            mv web/app-release-signed.apk web/public/aahat.apk
          elif ls web/*.apk 1> /dev/null 2>&1; then
            mv web/*.apk web/public/aahat.apk
          fi
          
          # Move log file to public folder if it exists
          if [ -f "web/build_log.txt" ]; then
            mv web/build_log.txt web/public/build_log.txt
          fi
          
          git add web/public/aahat.apk web/aahat-release-key.jks web/public/build_log.txt || true
          git diff-index --quiet HEAD || git commit -m "chore: commit APK / build logs [skip ci]"
          git push origin HEAD:main
